name: Actualizar historico VCP FCI

on:
  schedule:
    # Corre todos los dias a las 12:00 UTC = 09:00 hora Argentina
    # (despues del cierre de mercado, cuando CAFCI ya publico la planilla del dia)
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}  # permite tambien correrlo a mano desde la pestaña "Actions" de GitHub, por si hace falta

permissions:
  contents: write  # necesario para que el workflow pueda hacer commit y push

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pandas openpyxl requests

      - name: Correr script de actualizacion
        run: python actualizar_historico_cafci.py

      - name: Comitear historico.csv actualizado (si hubo cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.csv
          git diff --staged --quiet || git commit -m "Actualizar historico VCP - $(date +'%Y-%m-%d')"
          git push
